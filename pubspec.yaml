name: yahala_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+11

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  crypto: ^3.0.6

  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1

  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  image_picker: ^1.2.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  sign_in_with_apple:
    path: third_party/sign_in_with_apple

flutter:
  uses-material-design: true

  assets:
    - assets/logo.PNG
